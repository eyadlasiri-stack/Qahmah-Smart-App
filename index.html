<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5SG0HC6MBN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5SG0HC6MBN');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>نسخة التجارب - مباشر ليلة الحسم</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>

    <style>
        :root { 
            --gold-main: #d4af37; --gold-grad: linear-gradient(135deg, #aa8c2c 0%, #d4af37 50%, #f3e5ab 100%);
            --black-bg: #0a0a0a; --black-card: #141414; --glass-border: rgba(212, 175, 55, 0.15); 
            --text-main: #f8fafc;
        }
        
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: var(--text-main); font-family: 'Cairo', sans-serif;
        }

        /* تأثير الدخان المذهب */
        .golden-smoke-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.2) 0%, transparent 80%);
            filter: blur(20px); z-index: 1; pointer-events: none; animation: drift 5s infinite alternate;
        }
        @keyframes drift { 0% { opacity: 0.4; transform: scale(1); } 100% { opacity: 0.7; transform: scale(1.1); } }

        /* ستايل المباشر الصغير بالأسفل */
        .live-status-mini {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.3);
            padding: 2px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 700;
            color: #ef4444; margin-top: 10px;
        }
        .live-dot-mini { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

        .container { max-width: 500px; margin: auto; padding: 20px; text-align: center; }
        
        .champions-card { 
            border-radius: 25px; position: relative; overflow: hidden; padding: 30px 15px;
            border: 1px solid var(--glass-border); background: #111;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        }

        /* منطقة النتيجة الأفقية */
        .match-row { display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; }
        .team-box { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .team-logo { width: 65px; height: 65px; object-fit: contain; filter: drop-shadow(0 5px 10px #000); }
        .team-name { font-size: 0.9rem; font-weight: 800; color: #f3e5ab; }

        .score-center { 
            flex: 1.5; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .score-numbers {
            font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(212,175,55,0.5); font-family: sans-serif;
            background: rgba(255,255,255,0.03); padding: 5px 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        header { margin-bottom: 30px; }
        .logo-top { width: 80px; margin-bottom: 10px; }
        h1 { font-size: 1.1rem; margin: 0; color: var(--gold-light); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="https://i.ibb.co/Xf7761W2/5-B1-AD85-D-E147-422-B-953-C-0518-D83-FF042.png" class="logo-top">
            <h1>نهائي القحمة 28</h1>
        </header>

        <div class="champions-card">
            <div class="golden-smoke-overlay"></div>
            
            <div class="match-row">
                <div class="team-box">
                    <img src="https://i.ibb.co/YrBRjxC/E3-B24994-B882-4021-80-E8-A101-D6-DB1-A0-E.png" class="team-logo">
                    <span class="team-name">الفيصلي</span>
                </div>

                <div class="score-center">
                    <div class="score-numbers" id="live-score">0 - 0</div>
                    
                    <div class="live-status-mini">
                        <span class="live-dot-mini"></span> مباشر الآن
                    </div>
                </div>

                <div class="team-box">
                    <img src="https://i.ibb.co/RGGP0BDJ/56-A88516-0-B1-E-4-E26-A8-F1-609-AC13-C968-D.png" class="team-logo">
                    <span class="team-name">الوسام</span>
                </div>
            </div>
        </div>
        
        <p style="margin-top: 25px; font-size: 0.75rem; color: #666; font-weight: 700;">تتحدث النتيجة تلقائياً من الفايربيس دون تحديث 🚀</p>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

  const p1 = "AIzaSyDMSL"; const p2 = "sTOf_zy8Ec"; const p3 = "sL-YZJPsUk"; const p4 = "8JHZVaT18";
  const firebaseConfig = {
    apiKey: p1 + p2 + p3 + p4,
    authDomain: "eyad-a12a5.firebaseapp.com",
    databaseURL: "https://eyad-a12a5-default-rtdb.firebaseio.com",
    projectId: "eyad-a12a5"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  const liveScoreRef = ref(db, 'live_match_score');
  onValue(liveScoreRef, (snapshot) => {
      const data = snapshot.val();
      if (data) {
          const f = data.faisaly ?? 0;
          const w = data.wesam ?? 0;
          document.getElementById('live-score').innerText = `${f} - ${w}`;
      }
  });
</script>

</body>
</html>
