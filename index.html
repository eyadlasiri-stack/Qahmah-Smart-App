<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5SG0HC6MBN"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-5SG0HC6MBN');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>نسخة التجارب - مباشر ليلة الحسم</title>
    
    <meta name="description" content="البث المباشر لنتيجة نهائي بطولة القحمة الرمضانية 28.">
    <meta name="author" content="إياد عسيري">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* ========= ستايل الذهب الملكي ========= */
        :root { 
            --gold-main: #d4af37; --gold-light: #f3e5ab; --gold-dark: #aa8c2c; 
            --gold-grad: linear-gradient(135deg, #aa8c2c 0%, #d4af37 50%, #f3e5ab 100%);
            --bronze-gold: #c5a059; 
            --black-bg: #0a0a0a; --black-card: #141414; --glass-border: rgba(212, 175, 55, 0.15); 
            --text-main: #f8fafc; --text-muted: #a0a0a0; --green-neon: #10b981;
        }
        
        html { background-color: var(--black-bg); touch-action: manipulation; scroll-behavior: smooth; }
        body { 
            margin: 0; padding: 0; min-height: 100vh;
            background: linear-gradient(45deg, #0a0a0a, #1a1a1a, #0f0f0f, #0a0a0a);
            background-size: 400% 400%; animation: gradientBG 20s ease infinite;
            color: var(--text-main); font-family: 'Cairo', sans-serif; line-height: 1.6; font-size: 0.9rem; 
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* ========= التأثيرات السينمائية المباشرة ========= */
        .smoke-bg {
            position: absolute; bottom: -30px; left: 0; width: 100%; height: 160px;
            background: radial-gradient(ellipse at bottom, rgba(212,175,55,0.35) 0%, transparent 65%);
            filter: blur(20px); animation: smokeEffect 5s infinite alternate; z-index: 0; pointer-events: none;
        }
        @keyframes smokeEffect {
            0% { transform: translateY(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-15px) scale(1.1); opacity: 0.6; }
            100% { transform: translateY(0) scale(1); opacity: 0.2; }
        }
        .golden-smoke-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.3) 0%, transparent 80%);
            filter: blur(25px); z-index: 1; pointer-events: none; animation: goldenSmokeDrift 6s infinite alternate;
        }
        @keyframes goldenSmokeDrift { 0% { transform: scale(1) translateY(0); opacity: 0.5; } 100% { transform: scale(1.05) translateY(-5px); opacity: 0.8; } }

        /* ستايل المباشر (LIVE) */
        .live-now-badge {
            background: rgba(220, 38, 38, 0.15); border: 1px solid #dc2626; color: #f8fafc;
            padding: 5px 18px; border-radius: 30px; font-size: 0.85rem; font-weight: 900;
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); text-shadow: 0 2px 5px #000;
        }
        .live-dot {
            width: 10px; height: 10px; background: #ef4444; border-radius: 50%;
            animation: blinkRed 1s infinite alternate; box-shadow: 0 0 10px #ef4444;
        }
        @keyframes blinkRed { from { opacity: 1; transform: scale(1); } to { opacity: 0.4; transform: scale(0.8); } }

        /* شاشة التحميل */
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s; }
        #preloader.hidden { opacity: 0; pointer-events: none; }
        .preloader-logo { width: 130px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5)); animation: gentlePulse 2s ease-in-out infinite; }
        @keyframes gentlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* ستايلات عامة */
        .container { max-width: 900px; margin: auto; padding: 12px; min-height: 100vh; display: flex; flex-direction: column; }
        header { text-align: center; padding: 20px 0; background: linear-gradient(to bottom, rgba(20, 20, 20, 0.9), rgba(10, 10, 10, 0.9)); border: 1px solid var(--glass-border); border-top: none; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; margin-bottom: 20px; margin-top: -12px; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .logo-img { width: 90px; height: auto; display: block; margin: 0 auto 8px; filter: drop-shadow(0 4px 8px rgba(212, 175, 55, 0.2)); }
        header h1 { font-weight: 900; margin: 0; font-size: 1.3rem; color: var(--gold-light); }
        
        .champions-card { border-radius: 20px; position: relative; overflow: hidden; text-align: center; }
        .champions-glow { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; background: radial-gradient(circle, rgba(212,175,55,0.25) 0%, transparent 70%); z-index: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="preloader">
        <img src="https://i.ibb.co/Xf7761W2/5-B1-AD85-D-E147-422-B-953-C-0518-D83-FF042.png" alt="شعار البطولة" class="preloader-logo" crossorigin="anonymous">
    </div>

    <div class="container">
        <header id="main-header">
            <img src="https://i.ibb.co/Xf7761W2/5-B1-AD85-D-E147-422-B-953-C-0518-D83-FF042.png" class="logo-img" crossorigin="anonymous">
            <h1>بطولة القحمة الرمضانية 28</h1>
            <span style="color: var(--gold-main); font-size: 0.8rem; font-weight: 900; margin-top: 5px; display: block;">نسخة البث المباشر (للتجارب)</span>
        </header>

        <div id="today-match-area">
            <div class="champions-card" style="padding: 25px 15px 20px; border: 1px solid rgba(212,175,55,0.3); background: linear-gradient(180deg, #111 0%, #050505 100%); box-shadow: 0 10px 40px rgba(0,0,0,0.9), inset 0 0 30px rgba(212,175,55,0.05);">
                
                <div class="smoke-bg"></div>
                <div class="golden-smoke-overlay"></div>
                <div class="champions-glow" style="width: 250px; height: 250px;"></div>

                <div style="position:relative; z-index:2; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                    <div class="live-now-badge">
                        <span class="live-dot"></span> مباشر - يلعب الآن
                    </div>
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; padding: 0; position: relative; z-index:2;">
                    
                    <div style="flex: 1; display:flex; flex-direction:column; align-items:center; position: relative;">
                        <img src="https://i.ibb.co/YrBRjxC/E3-B24994-B882-4021-80-E8-A101-D6-DB1-A0-E.png" style="width: 75px; height: 75px; object-fit:contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.9)); margin-bottom: 10px;" crossorigin="anonymous">
                        <span style="font-size: 1.1rem; font-weight: 900; color: var(--gold-light); text-shadow: 0 2px 5px #000;">الفيصلي</span>
                    </div>
                    
                    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1.2; position: relative;">
                        <div id="live-score-display" style="font-size: 3.2rem; font-weight: 900; color: #fff; text-shadow: 0 0 25px rgba(212,175,55,0.9); margin: 0 10px; letter-spacing: 5px; font-family: sans-serif;">
                            0 - 0
                        </div>
                    </div>

                    <div style="flex: 1; display:flex; flex-direction:column; align-items:center; position: relative;">
                        <img src="https://i.ibb.co/RGGP0BDJ/56-A88516-0-B1-E-4-E26-A8-F1-609-AC13-C968-D.png" style="width: 75px; height: 75px; object-fit:contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.9)); margin-bottom: 10px;" crossorigin="anonymous">
                        <span style="font-size: 1.1rem; font-weight: 900; color: var(--gold-light); text-shadow: 0 2px 5px #000;">الوسام</span>
                    </div>
                </div>

                <div style="position:relative; z-index:2; background: linear-gradient(90deg, transparent, rgba(212,175,55,0.15), transparent); padding:10px; border-radius:8px; border-top: 1px solid rgba(212,175,55,0.3); margin-top: 15px;">
                    <span style="font-size:0.85rem; color:var(--gold-light); font-weight:900; text-shadow: 0 2px 5px rgba(0,0,0,0.9); display:block; text-align:center;">ليلة كتابة التاريخ في القحمة! ✍️</span>
                </div>
            </div>
        </div>

    </div>

<script>
window.onload = function() { 
    setTimeout(() => {
        document.getElementById('preloader').classList.add('hidden');
    }, 800);
};
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

  // مفاتيح الفايربيس الخاصة بك
  const p1 = "AIzaSyDMSL";
  const p2 = "sTOf_zy8Ec";
  const p3 = "sL-YZJPsUk";
  const p4 = "8JHZVaT18";
  
  const firebaseConfig = {
    apiKey: p1 + p2 + p3 + p4,
    authDomain: "eyad-a12a5.firebaseapp.com",
    databaseURL: "https://eyad-a12a5-default-rtdb.firebaseio.com",
    projectId: "eyad-a12a5",
    storageBucket: "eyad-a12a5.firebasestorage.app",
    messagingSenderId: "870950813206",
    appId: "1:870950813206:web:255df2c810fdf98051bf37"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  
  // كود جلب النتيجة الحية من الفايربيس
  const liveScoreRef = ref(db, 'live_match_score');
  
  onValue(liveScoreRef, (snapshot) => {
      const data = snapshot.val();
      const scoreDisplay = document.getElementById('live-score-display');
      
      if (data && scoreDisplay) {
          // جلب أرقام الأهداف (وإذا لم تكن موجودة يضع صفر)
          let f_score = data.faisaly !== undefined ? data.faisaly : 0;
          let w_score = data.wesam !== undefined ? data.wesam : 0;
          
          // تحديث النتيجة على الشاشة
          scoreDisplay.innerText = f_score + " - " + w_score;
      }
  });

</script>

</body>
</html>
