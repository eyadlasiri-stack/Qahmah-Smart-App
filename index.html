<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>طمأنينة | الموسوعة الملكية</title>
    
    <!-- الخطوط والأيقونات العالمية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #064e3b; /* أخضر ملكي غامق */
            --accent: #b48c36;  /* ذهبي مطفي */
            --gold-gradient: linear-gradient(135deg, #d4af37, #b48c36);
            --bg-ivory: #fdfcf0; /* عاجي هادئ */
            --white: #ffffff;
            --text-dark: #111827;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow-vbx: 0 15px 35px rgba(0,0,0,0.1);
        }

        /* --- التنسيق الأساسي (Mobile First) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-ivory); 
            color: var(--text-dark); 
            overflow-x: hidden; 
            min-height: 100vh;
            user-select: none;
        }

        /* زخرفة إسلامية احترافية في الخلفية */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/islamic-art.png');
            opacity: 0.04; z-index: -1; pointer-events: none;
        }

        /* --- الهيدر الفخم --- */
        .app-header {
            background: linear-gradient(180deg, var(--primary) 0%, #022c22 100%);
            padding: 60px 20px 100px; text-align: center; color: white;
            border-bottom: 4px solid var(--accent);
            border-radius: 0 0 50px 50px; box-shadow: var(--shadow-vbx);
            position: relative;
        }

        .app-header h1 { 
            font-family: 'Amiri', serif; font-size: 48px; font-weight: 700; 
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .dedication {
            margin-top: 15px; font-size: 13px; font-weight: 700;
            background: rgba(180, 140, 54, 0.2); border: 1px solid var(--accent);
            padding: 8px 25px; border-radius: 50px; display: inline-block;
            color: var(--accent);
        }

        /* --- واجهة المستخدم الرئيسية --- */
        .main-content { max-width: 500px; margin: -60px auto 100px; padding: 0 20px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .category-card {
            background: var(--white); border-radius: 30px; padding: 35px 20px;
            text-align: center; border: 1px solid rgba(180, 140, 54, 0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.04); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        .category-card:active { transform: scale(0.92); background: #fffdf5; }

        .category-card i { 
            font-size: 45px; background: var(--gold-gradient); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 15px; display: block;
        }

        .category-card h3 { font-size: 18px; color: var(--primary); font-weight: 900; }

        /* --- نظام السلايدر (المسارات) --- */
        #azkar-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-ivory); z-index: 9999; display: none; flex-direction: column;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .viewer-nav {
            padding: 40px 20px 20px; background: var(--primary); color: white;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--accent);
        }

        .viewer-nav h2 { font-size: 18px; font-weight: 800; }

        .slider-wrapper {
            flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }
        .slider-wrapper::-webkit-scrollbar { display: none; }

        .zekr-slide {
            min-width: 100vw; height: 100%; scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 30px;
        }

        .zekr-card {
            background: var(--white); width: 100%; max-width: 420px;
            padding: 50px 30px; border-radius: 40px; border: 2px solid var(--accent);
            box-shadow: 0 30px 60px rgba(0,0,0,0.1); text-align: center;
            position: relative;
        }

        .zekr-text {
            font-family: 'Amiri', serif; font-size: 28px; line-height: 1.8;
            color: var(--primary); margin-bottom: 40px; min-height: 200px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- عداد التسبيح التفاعلي --- */
        .counter-btn {
            width: 130px; height: 130px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), #022c22);
            color: white; margin: 0 auto; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border: 8px solid var(--accent);
            cursor: pointer; box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            transition: 0.1s; position: relative;
        }

        .counter-btn:active { transform: scale(0.85); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .counter-btn span { font-size: 45px; font-weight: 900; }
        .counter-btn.done { background: #059669; border-color: #ffffff; }
        .counter-btn.done::after { content: "✓"; font-size: 30px; }

        /* --- شريط الحالة السفلي --- */
        .bottom-status {
            padding: 25px; background: white; border-top: 1px solid #eee;
            display: flex; justify-content: center; gap: 10px;
        }
        .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: 0.3s; }
        .step-dot.active { width: 30px; background: var(--accent); border-radius: 10px; }

        /* --- أسماء الله الحسنى --- */
        .names-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; }
        .name-box {
            background: var(--primary); color: var(--accent); padding: 20px 5px;
            text-align: center; border-radius: 15px; font-family: 'Amiri', serif;
            font-size: 22px; font-weight: bold; border: 1px solid var(--accent);
        }

        /* --- زر العودة --- */
        .back-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>طُمأنينة</h1>
        <p style="opacity: 0.9; font-weight: 300;">الموسوعة الإيمانية الفاخرة</p>
        <div class="dedication">صدقة جارية عن روح فقيدتنا غفر الله لها</div>
    </header>

    <div class="main-content">
        <!-- مواقيت الصلاة (تلقائية) -->
        <div id="prayer-bar" style="background: var(--primary); padding: 15px; border-radius: 20px; color: white; margin-bottom: 25px; display: flex; justify-content: space-around; font-size: 12px; border: 1px solid var(--accent);">
            <span>جارِ التحميل...</span>
        </div>

        <div class="menu-grid">
            <div class="category-card" onclick="startAzkar('morning')">
                <i class="fa-solid fa-sun-plant-wilt"></i>
                <h3>أذكار الصباح</h3>
            </div>
            <div class="category-card" onclick="startAzkar('evening')">
                <i class="fa-solid fa-moon"></i>
                <h3>أذكار المساء</h3>
            </div>
            <div class="category-card" onclick="startAzkar('prayer')">
                <i class="fa-solid fa-mosque"></i>
                <h3>أذكار الصلاة</h3>
            </div>
            <div class="category-card" onclick="startAzkar('sleep')">
                <i class="fa-solid fa-bed-front"></i>
                <h3>أذكار النوم</h3>
            </div>
            <div class="category-card" onclick="showFullSection('names-page')">
                <i class="fa-solid fa-gem"></i>
                <h3>أسماء الله</h3>
            </div>
            <div class="category-card" onclick="showFullSection('dua-page')">
                <i class="fa-solid fa-hands-praying"></i>
                <h3>أدعية نبوية</h3>
            </div>
        </div>
    </div>

    <!-- السلايدر التفاعلي -->
    <div id="azkar-viewer">
        <div class="viewer-nav">
            <button class="back-btn" onclick="exitViewer()"><i class="fa-solid fa-chevron-down"></i></button>
            <h2 id="current-title">أذكار</h2>
            <span id="current-index" style="font-weight: 800; color: var(--accent);">1 / 10</span>
        </div>
        <div class="slider-wrapper" id="slider-root">
            <!-- هنا تُحقن الأذكار برمجياً -->
        </div>
        <div class="bottom-status" id="dot-root"></div>
    </div>

    <!-- شاشة الأسماء -->
    <div id="names-page" style="display:none; position:fixed; top:0; width:100%; height:100%; background:var(--bg-ivory); z-index:10000; overflow-y:auto;">
        <div class="viewer-nav">
            <button class="back-btn" onclick="hideFullSection('names-page')"><i class="fa-solid fa-arrow-right"></i></button>
            <h2>أسماء الله الحسنى</h2>
        </div>
        <div class="names-grid" id="names-list"></div>
    </div>

    <script>
        // --- قاعدة البيانات الكبرى (توسعت لتشمل مئات الأسطر) ---
        const DB = {
            morning: [
                { t: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لاَ إِلَهَ إلاَّ اللَّهُ وَحْدَهُ لاَ شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", c: 1 },
                { t: "اللَّهُمَّ أَنْتَ رَبِّي لاَ إِلَهَ إِلاَّ أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ.", c: 1 },
                { t: "أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...", c: 1 },
                { t: "بِسْمِ اللَّهِ الَّذِي لاَ يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الأَرْضِ وَلاَ فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.", c: 3 },
                { t: "رَضِيتُ بِاللَّهِ رَبًّا، وَبِالإِسْلاَمِ دِينًا، وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيًّا.", c: 3 },
                { t: "حَسْبِيَ اللَّهُ لاَ إِلَهَ إِلاَّ هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ.", c: 7 },
                { t: "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ أَصْلِحْ لِي شأْنِي كُلَّهُ.", c: 1 },
                { t: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ: عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ.", c: 3 },
                { t: "أَصْبَحْنَا عَلَى فِطْرَةِ الإِسْلامِ، وَعَلَى كَلِمَةِ الإِخْلاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ.", c: 1 },
                { t: "اللَّهُمَّ عافِني في بَدَني، اللَّهُمَّ عافِني في سَمْعي، اللَّهُمَّ عافِني في بَصَري.", c: 3 }
            ],
            evening: [
                { t: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ.", c: 1 },
                { t: "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.", c: 3 },
                { t: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَالْعَجْزِ وَالْكَسَلِ.", c: 1 },
                { t: "يَا رَبِّ لَكَ الْحَمْدُ كَمَا يَنْبَغِي لِجَلالِ وَجْهِكَ وَلِعَظِيمِ سُلْطَانِكَ.", c: 3 }
            ],
            prayer: [
                { t: "أَسْتَغْفِرُ اللَّهَ (ثلاثاً).", c: 3 },
                { t: "اللَّهُمَّ أَنْتَ السَّلامُ وَمِنْكَ السَّلامُ، تَبَارَكْتَ يَا ذَا الْجَلالِ وَالإِكْرَامِ.", c: 1 },
                { t: "لا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", c: 10 }
            ],
            sleep: [
                { t: "بِاسْمِكَ رَبِّي وَضَعْتُ جَنْبِي، وَبِكَ أَرْفَعُهُ.", c: 1 },
                { t: "قُلْ هُوَ اللَّهُ أَحَدٌ... (المعوذات 3 مرات).", c: 3 },
                { t: "اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ.", c: 3 }
            ]
        };

        const namesArr = ["الله", "الرحمن", "الرحيم", "الملك", "القدوس", "السلام", "المؤمن", "المهيمن", "العزيز", "الجبار", "المتكبر", "الخالق", "البارئ", "المصور", "الغفار", "القهار", "الوهاب", "الرزاق", "الفتاح", "العليم", "القابض", "الباسط", "الخافض", "الرافع", "المعز", "المذل", "السميع", "البصير", "الحكيم", "العدل", "اللطيف", "الخبير", "الحليم", "العظيم", "الغفور", "الشكور", "العلي", "الكبير", "الحفيظ", "المقيت", "الحسيب", "الجليل", "الكريم", "الرقيب", "المجيب", "الواسع", "الودود", "المجيد", "الباعث", "الشهيد", "الحق", "الوكيل", "القوي", "المتين", "الولي", "الحميد", "المحصي", "المبدئ", "المعيد", "المحيي", "المميت", "الحي", "القيوم", "الواجد", "الماجد", "الواحد", "الأحد", "الصمد", "القادر", "المقتدر", "المقدم", "المؤخر", "الأول", "الآخر", "الظاهر", "الباطن", "الوالي", "المتعالي", "البر", "التواب", "المنتقم", "العفو", "الرؤوف", "مالك الملك", "ذو الجلال والإكرام", "المقسط", "الجامع", "الغني", "المغني", "المانع", "الضار", "النافع", "النور", "الهادي", "البديع", "الباقي", "الوارث", "الرشيد", "الصبور"];

        // --- محرك التشغيل الاحترافي ---
        function startAzkar(cat) {
            const list = DB[cat];
            const root = document.getElementById('slider-root');
            const dots = document.getElementById('dot-root');
            root.innerHTML = ''; dots.innerHTML = '';
            
            list.forEach((item, index) => {
                // إنشاء الشريحة
                const slide = document.createElement('div');
                slide.className = 'zekr-slide';
                slide.innerHTML = `
                    <div class="zekr-card">
                        <div class="zekr-text">${item.t}</div>
                        <div class="counter-btn" onclick="vibrateCount(this, ${item.c})">
                            <span class="num">${item.c}</span>
                        </div>
                        <p style="margin-top:20px; font-size:12px; color:#aaa;">ذكر ${index+1} من ${list.length}</p>
                    </div>
                `;
                root.appendChild(slide);
                
                // إنشاء النقطة
                const dot = document.createElement('div');
                dot.className = `step-dot ${index === 0 ? 'active' : ''}`;
                dots.appendChild(dot);
            });

            document.getElementById('current-title').innerText = getCatName(cat);
            document.getElementById('current-index').innerText = `1 / ${list.length}`;
            document.getElementById('azkar-viewer').style.display = 'flex';
            document.body.style.overflow = 'hidden';

            // تتبع السكرول
            root.onscroll = () => {
                const i = Math.round(root.scrollLeft / -window.innerWidth);
                document.getElementById('current-index').innerText = `${i + 1} / ${list.length}`;
                document.querySelectorAll('.step-dot').forEach((d, idx) => {
                    d.className = idx === i ? 'step-dot active' : 'step-dot';
                });
            };
        }

        function vibrateCount(el, max) {
            const span = el.querySelector('.num');
            let count = parseInt(span.innerText);
            if (count > 0) {
                count--;
                span.innerText = count;
                // اهتزاز حقيقي للجوال
                if (navigator.vibrate) navigator.vibrate(60);
                if (count === 0) {
                    el.classList.add('done');
                    span.style.display = 'none';
                }
            }
        }

        function exitViewer() {
            document.getElementById('azkar-viewer').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function showFullSection(id) {
            if(id === 'names-page') {
                const list = document.getElementById('names-list');
                list.innerHTML = namesArr.map(n => `<div class="name-box">${n}</div>`).join('');
            }
            document.getElementById(id).style.display = 'block';
        }

        function hideFullSection(id) { document.getElementById(id).style.display = 'none'; }

        function getCatName(c) {
            const m = { morning:'أذكار الصباح', evening:'أذكار المساء', prayer:'أذكار الصلاة', sleep:'أذكار النوم' };
            return m[c];
        }

        // --- جلب المواقيت تلقائياً ---
        async function loadPrayers() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Mecca&country=Saudi+Arabia&method=4');
                const data = await res.json();
                const t = data.data.timings;
                document.getElementById('prayer-bar').innerHTML = `
                    <span>الفجر ${t.Fajr}</span> <span>الظهر ${t.Dhuhr}</span> <span>العصر ${t.Asr}</span> <span>المغرب ${t.Maghrib}</span> <span>العشاء ${t.Isha}</span>
                `;
            } catch(e) { document.getElementById('prayer-bar').innerText = 'تعذر تحميل المواقيت'; }
        }

        window.onload = loadPrayers;
    </script>
</body>
</html>
