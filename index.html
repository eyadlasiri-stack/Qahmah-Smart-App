<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غيث القحمة | صدقة جارية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="app-logo">
            <i class="fa-solid fa-heart-pulse"></i>
            <h2>غيث القحمة</h2>
            <small>صدقة جارية عن والدة إياد</small>
        </div>
        <button class="menu-item active" data-target="home-page"><i class="fa-solid fa-mosque"></i> مواقيت الصلاة</button>
        <button class="menu-item" data-target="quran-page"><i class="fa-solid fa-book-open"></i> المصحف الإلكتروني</button>
        <button class="menu-item" data-target="azkar-page"><i class="fa-solid fa-rosary"></i> حصن المسلم</button>
        <button class="menu-item" data-target="sebha-page"><i class="fa-solid fa-circle-dot"></i> السبحة الذكية</button>
        <button class="menu-item" data-target="masajid-page"><i class="fa-solid fa-map-location-dot"></i> مساجد القحمة</button>
        <button class="menu-item" data-target="about-qahmah-page"><i class="fa-solid fa-city"></i> عن القحمة</button>
    </aside>

    <main class="main-content">
        <div id="home-page" class="page-content">
            <div class="header">
                <h1 class="location-title">مواقيت الصلاة في القحمة</h1>
                <p id="gregorian-date" class="date-container">جاري التحميل...</p>
            </div>
            <div id="loading" class="loading"><i class="fas fa-circle-notch fa-spin"></i> جاري تحديث الأوقات...</div>
            <div class="prayers-grid" id="prayers-container" style="display: none;">
                </div>
        </div>

        <div id="quran-page" class="page-content" style="display: none;">
            <div class="header"><h1 class="location-title">القرآن الكريم</h1></div>
            <iframe src="https://quran.com/" style="width:100%; height:80vh; border-radius:15px; border:none;"></iframe>
        </div>

        <div id="azkar-page" class="page-content" style="display: none;"></div>
        <div id="masajid-page" class="page-content" style="display: none;"></div>
        
        <div id="sebha-page" class="page-content" style="display: none;">
            <div class="sebha-container">
                <h2 style="color:var(--primary); margin-bottom:20px;">ألا بذكر الله تطمئن القلوب</h2>
                <div class="sebha-counter" id="sebha-count">0</div>
                <button class="sebha-btn" id="sebha-click-btn">سبّح</button>
                <button class="reset-btn" id="sebha-reset-btn">إعادة العداد ↺</button>
            </div>
        </div>

        <div id="about-qahmah-page" class="page-content" style="display: none;">
            <div class="about-grid" id="about-data"></div>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
